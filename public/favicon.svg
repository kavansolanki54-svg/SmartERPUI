<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Clean White Background -->
  <rect x="0" y="0" width="64" height="64" rx="14" fill="#ffffff"/>

  <!-- SmartERP Circuit S with Arrow Logo -->
  <g transform="translate(10, 15) scale(0.9)">
    <!-- Circuit lines & nodes forming 'S' and Growth Arrow -->
    <!-- Main S-Path -->
    <path d="M 28 8 L 14 8 C 10 8 7 11 7 15 C 7 19 10 22 14 22 L 28 22 C 32 22 35 25 35 29 C 35 33 32 36 28 36 L 14 36" 
          fill="none" stroke="#003fb1" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
    
    <!-- Circuit Nodes (dots) -->
    <circle cx="28" cy="8" r="2.5" fill="#003fb1"/>
    <circle cx="7" cy="22" r="2" fill="#003fb1"/>
    <circle cx="35" cy="22" r="2" fill="#003fb1"/>
    <circle cx="14" cy="36" r="2.5" fill="#003fb1"/>

    <!-- Growth Arrow Diagonal Line -->
    <path d="M 12 30 L 34 8" fill="none" stroke="#003fb1" stroke-width="3.5" stroke-linecap="round"/>
    
    <!-- Arrowhead -->
    <path d="M 24 8 H 34 V 18" fill="none" stroke="#003fb1" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>